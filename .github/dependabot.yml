version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      xunit:
        patterns:
          - "xunit*"
      microsoft-test:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "MSTest*"
      sourcelink:
        patterns:
          - "Microsoft.SourceLink.*"
